name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create application-prod.properties
        run: |
          cat > src/main/resources/application-prod.properties << EOF
          spring.datasource.url=$SPRING_DATASOURCE_URL
          spring.datasource.username=$SPRING_DATASOURCE_USERNAME
          spring.datasource.password=$SPRING_DATASOURCE_PASSWORD
          spring.datasource.driver-class-name=org.postgresql.Driver
          coupang.access-key=$COUPANG_ACCESS_KEY
          coupang.secret-key=$COUPANG_SECRET_KEY
          jwt.secret=$JWT_SECRET
          jwt.access-expiration-ms=600000
          jwt.refresh-expiration-ms=604800000
          google.client-id=$GOOGLE_CLIENT_ID
          google.client-secret=$GOOGLE_CLIENT_SECRET
          google.redirect-uri=$GOOGLE_REDIRECT_URI
          kakao.client-id=$KAKAO_CLIENT_ID
          kakao.client-secret=$KAKAO_CLIENT_SECRET
          kakao.redirect-uri=$KAKAO_REDIRECT_URI
          naver.client-id=$NAVER_CLIENT_ID
          naver.client-secret=$NAVER_CLIENT_SECRET
          naver.redirect-uri=$NAVER_REDIRECT_URI
          app.frontend-url=$APP_FRONTEND_URL
          server.forward-headers-strategy=framework
          EOF
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
          APP_FRONTEND_URL: ${{ secrets.APP_FRONTEND_URL }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar --no-daemon -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nutriuniv:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,COUPANG_ACCESS_KEY,COUPANG_SECRET_KEY,JWT_SECRET
          script: ~/nutriuniv/deploy.sh ${{ secrets.DOCKER_USERNAME }}/nutriuniv:latest
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
